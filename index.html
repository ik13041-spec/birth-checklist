<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출산가방 체크리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #FAF7F2;
  --white:   #FFFFFF;
  --text:    #3A3530;
  --sub:     #9A9088;
  --line:    #EDE8E0;
  --blush:   #F2C4C4;
  --blush-l: #FEF0F0;
  --blush-d: #D4888A;
  --sage:    #B8D4C8;
  --sage-l:  #EFF7F3;
  --sage-d:  #6A9E88;
  --sky:     #C4D8F2;
  --sky-l:   #EFF5FD;
  --sky-d:   #6A8EC0;
  --butter:  #F5E6C8;
  --butter-l:#FDF6E8;
  --butter-d:#C09850;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--cream);
  font-family: 'Gowun Dodum', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── 헤더 ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: 24px 32px 20px;
  position: sticky; top: 0; z-index: 100;
}
.header-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
.header-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 22px; font-weight: 700; line-height: 1.3;
}
.header-sub { font-size: 12px; color: var(--sub); margin-top: 4px; }

.header-actions { display:flex; gap:8px; }
.action-btn {
  background: var(--cream); border: 1.5px solid var(--line);
  color: var(--sub); border-radius: 8px; padding: 8px 14px;
  font-family: 'Gowun Dodum', sans-serif; font-size: 12px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.action-btn:hover { border-color: var(--text); color: var(--text); }
.action-btn.primary {
  background: var(--text); color: var(--white); border-color: var(--text);
}
.action-btn.primary:hover { opacity: .85; }

/* 진행 바 */
.progress-wrap { display:flex; align-items:center; gap:14px; }
.progress-bar-bg {
  flex: 1; height: 6px; background: var(--line);
  border-radius: 100px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--blush-d), var(--sage-d));
  border-radius: 100px; transition: width .4s ease;
}
.progress-text { font-size: 12px; color: var(--sub); white-space: nowrap; }
.progress-pct { font-weight: 700; color: var(--text); }

/* ── 탭 ── */
.tabs {
  display: flex; gap: 0; overflow-x: auto;
  padding: 0 32px; margin-top: -1px;
  background: var(--white); border-bottom: 1px solid var(--line);
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink: 0; padding: 12px 18px; font-size: 12px;
  color: var(--sub); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .2s; white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); font-weight: 700; border-bottom-color: var(--text); }
.tab-badge {
  display: inline-block; background: var(--line);
  color: var(--sub); font-size: 10px; padding: 1px 6px;
  border-radius: 20px; margin-left: 5px; vertical-align: middle;
}
.tab.active .tab-badge { background: var(--text); color: var(--white); }

/* ── 메인 ── */
.main { max-width: 700px; margin: 0 auto; padding: 28px 20px; }

/* 섹션 */
.section { margin-bottom: 32px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.section-icon { font-size: 20px; }
.section-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 16px; font-weight: 700;
}
.section-count { font-size: 11px; color: var(--sub); margin-left: auto; }

/* 체크 아이템 */
.item-list { display: flex; flex-direction: column; gap: 6px; }

.check-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border: 1.5px solid var(--line);
  border-radius: 10px; padding: 13px 16px;
  cursor: pointer; transition: all .2s;
  user-select: none;
}
.check-item:hover { border-color: #D4C8C0; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.check-item.checked {
  background: var(--sage-l); border-color: var(--sage);
}
.check-item.checked .item-name {
  text-decoration: line-through; color: var(--sub);
}

/* 체크박스 */
.checkbox {
  flex-shrink: 0; width: 22px; height: 22px;
  border: 2px solid var(--line); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; background: var(--white);
}
.check-item.checked .checkbox {
  background: var(--sage-d); border-color: var(--sage-d);
}
.checkbox-tick {
  color: white; font-size: 12px; font-weight: 700;
  opacity: 0; transform: scale(.5); transition: all .18s;
}
.check-item.checked .checkbox-tick { opacity: 1; transform: scale(1); }

.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; line-height: 1.4; transition: all .2s; }
.item-note { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* 중요도 뱃지 */
.badge {
  flex-shrink: 0; font-size: 10px; padding: 2px 8px;
  border-radius: 20px; font-weight: 700; letter-spacing: .3px;
}
.badge.must { background: #FEEAEA; color: #C05050; }
.badge.good { background: var(--butter-l); color: var(--butter-d); }

/* 빈 상태 (전부 체크) */
.all-done {
  display: none; text-align: center;
  padding: 48px 20px; color: var(--sub);
}
.all-done.show { display: block; }
.all-done-icon { font-size: 48px; margin-bottom: 12px; }
.all-done-title { font-family: 'Nanum Myeongjo', serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }

/* 완료 팝업 */
.congrats {
  position: fixed; inset: 0; background: rgba(58,53,48,.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.congrats.show { opacity: 1; pointer-events: all; }
.congrats-box {
  background: var(--white); border-radius: 20px;
  padding: 40px 36px; text-align: center; max-width: 320px;
  transform: scale(.9); transition: transform .3s;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
.congrats.show .congrats-box { transform: scale(1); }
.congrats-emoji { font-size: 52px; margin-bottom: 16px; }
.congrats-title { font-family: 'Nanum Myeongjo', serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.congrats-sub { font-size: 13px; color: var(--sub); line-height: 1.7; margin-bottom: 24px; }
.congrats-btn {
  background: var(--text); color: var(--white); border: none;
  border-radius: 10px; padding: 12px 28px;
  font-family: 'Gowun Dodum', sans-serif; font-size: 14px;
  cursor: pointer; transition: opacity .2s;
}
.congrats-btn:hover { opacity: .85; }

/* 인쇄 */
@media print {
  .header-actions, .tabs, .action-btn, .congrats { display:none!important; }
  body { background: white; padding: 0; }
  .header { position: static; box-shadow: none; }
  .check-item { break-inside: avoid; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🏥 출산가방 체크리스트</div>
      <div class="header-sub">D-day를 위한 완벽 준비 · 진행률을 확인하세요</div>
    </div>
    <div class="header-actions">
      <button class="action-btn" onclick="resetAll()">↺ 초기화</button>
      <button class="action-btn primary" onclick="window.print()">🖨 인쇄</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span class="progress-pct" id="progressPct">0%</span>
      &nbsp;<span id="progressCount">0 / 0</span> 완료
    </div>
  </div>
</div>

<!-- 탭 -->
<div class="tabs" id="tabs"></div>

<!-- 메인 -->
<div class="main" id="main"></div>

<!-- 완료 팝업 -->
<div class="congrats" id="congrats" onclick="this.classList.remove('show')">
  <div class="congrats-box" onclick="event.stopPropagation()">
    <div class="congrats-emoji">🎉</div>
    <div class="congrats-title">준비 완료!</div>
    <div class="congrats-sub">출산가방 준비를 모두 마쳤어요.<br>건강하고 순산하시길 바랍니다 🌸</div>
    <button class="congrats-btn" onclick="document.getElementById('congrats').classList.remove('show')">확인</button>
  </div>
</div>

<script>
// ── 데이터 ──
const CATEGORIES = [
  {
    id: 'mom', label: '엄마 준비물', icon: '👩',
    items: [
      // 필수
      { id:'m1',  name:'신분증 / 보험카드',          note:'건강보험증, 신분증 필수',              must:true  },
      { id:'m2',  name:'출산 예약 서류 / 진료기록',  note:'병원에서 요청한 서류 모두',            must:true  },
      { id:'m3',  name:'핸드폰 충전기',               note:'장시간 입원에 필수',                   must:true  },
      { id:'m4',  name:'산모 패드 (다량)',             note:'분만 후 오로 대비, 넉넉히 준비',       must:true  },
      { id:'m5',  name:'산후 거들 / 복대',            note:'제왕절개 시 특히 필요',                must:true  },
      { id:'m6',  name:'수유 브라 & 패드',            note:'수유 시작 전에 미리 준비',             must:true  },
      { id:'m7',  name:'편한 실내복 (수유 가능)',     note:'앞 트임 디자인 추천',                  must:true  },
      { id:'m8',  name:'슬리퍼 & 양말',              note:'병원 바닥은 차가울 수 있어요',         must:true  },
      { id:'m9',  name:'세면도구 (칫솔·치약·샴푸)', note:'소분 용기에 담아오면 편리',            must:true  },
      { id:'m10', name:'타월 & 손수건',               note:'2~3장 준비',                           must:true  },
      { id:'m11', name:'현금 & 카드',                 note:'병원 편의시설 이용',                   must:true  },
      // 선택
      { id:'m12', name:'산모용 변비약',               note:'의사 처방 or 마그밀',                  must:false },
      { id:'m13', name:'입술 보습제',                 note:'분만 중 입술 건조함 대비',             must:false },
      { id:'m14', name:'스트로우 텀블러',             note:'누운 채로 마실 수 있어 편리',          must:false },
      { id:'m15', name:'간식 & 에너지 음료',          note:'입원 중 출출할 때',                    must:false },
      { id:'m16', name:'헤어밴드 & 머리끈',           note:'분만 시 머리카락 정리',                must:false },
      { id:'m17', name:'귀마개 & 안대',               note:'신생아실 소음 대비',                   must:false },
      { id:'m18', name:'태블릿 / 책',                 note:'입원 중 무료함 달래기',                must:false },
    ]
  },
  {
    id: 'baby', label: '아기 준비물', icon: '👶',
    items: [
      { id:'b1',  name:'배냇저고리 (2~3벌)',          note:'신생아용, 끈 여미기 타입',             must:true  },
      { id:'b2',  name:'신생아 기저귀',               note:'1팩 (퇴원용 + 초기)',                  must:true  },
      { id:'b3',  name:'물티슈',                      note:'무향·무알코올 신생아용',               must:true  },
      { id:'b4',  name:'아기 모자 & 손발싸개',       note:'체온 유지, 사계절 필수',               must:true  },
      { id:'b5',  name:'아기 담요 (얇은 것)',         note:'계절에 맞게 준비',                     must:true  },
      { id:'b6',  name:'퇴원용 외출복',               note:'계절 맞는 예쁜 옷 1벌',               must:true  },
      { id:'b7',  name:'신생아 카시트',               note:'퇴원 시 차량 이동 법적 필수',          must:true  },
      { id:'b8',  name:'젖꼭지 / 공갈 젖꼭지',       note:'모유 수유 계획 시 선택',               must:false },
      { id:'b9',  name:'분유 & 신생아용 젖병',        note:'모유 부족 대비 or 혼합 수유',          must:false },
      { id:'b10', name:'배꼽 소독 세트',              note:'병원 제공 여부 확인',                  must:false },
      { id:'b11', name:'아기 세정제 & 로션',          note:'신생아 전용 저자극 제품',              must:false },
      { id:'b12', name:'아기 체온계',                 note:'귀 체온계 추천',                       must:false },
      { id:'b13', name:'신생아 손톱가위',             note:'출생 직후부터 손톱 자라요',            must:false },
    ]
  },
  {
    id: 'doc', label: '서류 & 행정', icon: '📋',
    items: [
      { id:'d1',  name:'출생신고 준비 (출생증명서)',  note:'퇴원 시 병원에서 발급',                must:true  },
      { id:'d2',  name:'출산 혜택 신청 서류',         note:'첫만남이용권, 부모급여 등',            must:true  },
      { id:'d3',  name:'건강보험 피부양자 등록',      note:'아기 출생 후 14일 이내',               must:true  },
      { id:'d4',  name:'임신·출산 의료비 지원 신청',  note:'국민행복카드 잔액 확인',               must:true  },
      { id:'d5',  name:'배우자 출산 휴가 신청',       note:'10일 유급 휴가',                       must:false },
      { id:'d6',  name:'산모·신생아 건강관리사 신청', note:'정부 지원 가정방문 서비스',            must:false },
      { id:'d7',  name:'육아휴직 신청',               note:'출산 전 미리 고용보험 확인',           must:false },
    ]
  },
  {
    id: 'partner', label: '동반자 준비물', icon: '🤝',
    items: [
      { id:'p1',  name:'간식 & 식사',                 note:'분만 시간이 길 수 있어요',             must:true  },
      { id:'p2',  name:'핸드폰 충전기',               note:'연락 및 사진 촬영용',                  must:true  },
      { id:'p3',  name:'편한 옷',                     note:'분만실 동행 시 필요',                  must:true  },
      { id:'p4',  name:'카메라 / 핸드폰',             note:'소중한 순간 기록',                     must:false },
      { id:'p5',  name:'출생신고 준비물 숙지',        note:'서류·행정 담당자 지정',                must:false },
      { id:'p6',  name:'비상 연락망 정리',             note:'양가 부모님 연락처 등',               must:false },
    ]
  }
];

// ── 상태 ──
let checked = {};
let activeTab = 'all';

// 로컬 저장
function save() {
  try { localStorage.setItem('birth_bag_checked', JSON.stringify(checked)); } catch(e){}
}
function load() {
  try {
    const s = localStorage.getItem('birth_bag_checked');
    if (s) checked = JSON.parse(s);
  } catch(e){}
}

// 전체 아이템
function allItems() {
  return CATEGORIES.flatMap(c => c.items);
}

// 진행률 업데이트
function updateProgress() {
  const all = allItems();
  const total = all.length;
  const done  = all.filter(i => checked[i.id]).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total}`;

  // 탭 배지 업데이트
  CATEGORIES.forEach(cat => {
    const el = document.getElementById(`tab-badge-${cat.id}`);
    if (!el) return;
    const catDone = cat.items.filter(i => checked[i.id]).length;
    el.textContent = `${catDone}/${cat.items.length}`;
  });
  const allBadge = document.getElementById('tab-badge-all');
  if (allBadge) allBadge.textContent = `${done}/${total}`;

  if (done === total && total > 0) {
    setTimeout(() => document.getElementById('congrats').classList.add('show'), 400);
  }
}

// 토글
function toggle(id) {
  checked[id] = !checked[id];
  save();
  const el = document.getElementById(`item-${id}`);
  el.classList.toggle('checked', !!checked[id]);
  updateProgress();
}

// 초기화
function resetAll() {
  if (!confirm('모든 체크를 초기화할까요?')) return;
  checked = {};
  save();
  render();
}

// 탭 렌더
function renderTabs() {
  const tabs = document.getElementById('tabs');
  const all  = allItems();
  const total = all.length;
  const done  = all.filter(i => checked[i.id]).length;

  const tabData = [
    { id:'all', label:'전체', count:`${done}/${total}` },
    ...CATEGORIES.map(c => {
      const cd = c.items.filter(i => checked[i.id]).length;
      return { id: c.id, label: `${c.icon} ${c.label}`, count:`${cd}/${c.items.length}` };
    })
  ];

  tabs.innerHTML = tabData.map(t => `
    <div class="tab ${activeTab === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">
      ${t.label}
      <span class="tab-badge" id="tab-badge-${t.id}">${t.count}</span>
    </div>
  `).join('');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderMain();
}

// 메인 렌더
function renderMain() {
  const main = document.getElementById('main');
  const cats = activeTab === 'all' ? CATEGORIES : CATEGORIES.filter(c => c.id === activeTab);

  main.innerHTML = cats.map(cat => {
    const items = cat.items;
    const done  = items.filter(i => checked[i.id]).length;

    return `
      <div class="section">
        <div class="section-header">
          <span class="section-icon">${cat.icon}</span>
          <span class="section-title">${cat.label}</span>
          <span class="section-count">${done} / ${items.length}</span>
        </div>
        <div class="item-list">
          ${items.map(item => `
            <div class="check-item ${checked[item.id] ? 'checked' : ''}"
                 id="item-${item.id}"
                 onclick="toggle('${item.id}')">
              <div class="checkbox">
                <span class="checkbox-tick">✓</span>
              </div>
              <div class="item-info">
                <div class="item-name">${item.name}</div>
                ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
              </div>
              <span class="badge ${item.must ? 'must' : 'good'}">${item.must ? '필수' : '선택'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function render() {
  renderTabs();
  renderMain();
  updateProgress();
}

// 초기 실행
load();
render();
</script>
</body>
</html>
